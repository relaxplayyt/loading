<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DR5VE & SEEK</title>
    <style>
        * { margin: 0; padding: 0; }
        body { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden;
            background: #0a0c0a;
            font-family: Arial, sans-serif;
        }
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .slide.active { opacity: 1; }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
        }
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 2;
        }
        .title {
            font-size: 48px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 30px rgba(255,215,0,0.3);
        }
        .subtitle {
            font-size: 18px;
            color: #aaa;
            margin-top: 8px;
        }
        .tip {
            font-size: 14px;
            color: #ccc;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="slideshow"></div>
    <div class="overlay"></div>
    <div class="content">
        <div class="title">// DR5VE & SEEK //</div>
        <div class="subtitle">RUS+MODIFIED</div>
        <div class="tip" id="tip">Загрузка...</div>
    </div>

    <script>
        // ============================================================
        // ССЫЛКИ НА КАРТИНКИ (ИЗ ИНТЕРНЕТА)
        // ============================================================
        const backgrounds = [
            'https://твой-сайт.ру/bg_1.jpg',
            'https://твой-сайт.ру/bg_2.jpg',
            'https://твой-сайт.ру/bg_3.jpg',
            'https://твой-сайт.ру/bg_4.jpg'
        ];

        const tips = [
            'Нажмите E для невидимости',
            'Нажмите Q для прыжка',
            'Нажмите Z для пинка союзника',
            'Нажмите G для режима призрака',
            'Зажмите Z для прицеливания',
            'Используйте ПКМ для сонара',
            'Подбирайте бусты на карте',
            'Нажмите F2 для магазина',
            'Нажмите C для цвета машины',
            'Нажмите CTRL чтобы приподнять машину'
        ];

        let currentSlide = 0;

        const slideshow = document.getElementById('slideshow');
        backgrounds.forEach((bg, index) => {
            const div = document.createElement('div');
            div.className = 'slide' + (index === 0 ? ' active' : '');
            div.style.backgroundImage = 'url("' + bg + '")';
            slideshow.appendChild(div);
        });

        setInterval(() => {
            const slides = document.querySelectorAll('.slide');
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 8000);

        setInterval(() => {
            document.getElementById('tip').textContent = tips[Math.floor(Math.random() * tips.length)];
        }, 5000);
    </script>
</body>
</html>
